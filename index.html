<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>虹色ウォーターフォン v4</title>
<style>
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;background:#040b18;
  touch-action:none;-webkit-user-select:none;user-select:none;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans",sans-serif;color:white;
}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block}
.ui{
  position:fixed;inset:0;pointer-events:none;
  padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
  box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between
}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.title{text-shadow:0 2px 16px rgba(0,0,0,.6)}
.title b{display:block;font-size:22px;font-weight:520;letter-spacing:.03em}
.title span{display:block;margin-top:6px;font-size:12px;opacity:.78}
.buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;pointer-events:auto}
button{
  border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.14);color:white;
  border-radius:999px;padding:10px 13px;font-size:13px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)
}
button.on{background:rgba(255,255,255,.30);box-shadow:0 0 20px rgba(150,220,255,.35)}
.bottom{text-align:center;font-size:12px;opacity:.82;text-shadow:0 2px 12px rgba(0,0,0,.65)}
.meter{width:min(430px,74vw);height:7px;border-radius:999px;margin:10px auto 0;background:rgba(255,255,255,.18);overflow:hidden}
.meter i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#9df,#fbf,#ffd,#9ff);border-radius:999px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="top">
    <div class="title">
      <b>Waterphone</b>
      <span>指を置く＝同じ音がフェードイン / 離す＝消える</span>
    </div>
    <div class="buttons">
      <button id="soundBtn">音をON</button>
      <button id="motionBtn">傾きをON</button>
    </div>
  </div>
  <div class="bottom">
    画面を押しっぱなしで音が出ます。指を動かすと音程と音色が変わります。
    <div class="meter"><i id="meter"></i></div>
  </div>
</div>

<script>
(() => {
  const canvas=document.getElementById("c");
  const ctx=canvas.getContext("2d",{alpha:false});
  const soundBtn=document.getElementById("soundBtn");
  const motionBtn=document.getElementById("motionBtn");
  const meter=document.getElementById("meter");

  let W=0,H=0,DPR=1,t=0;
  let touches=new Map(), ripples=[];
  let targetTiltX=0,targetTiltY=0,tiltX=0,tiltY=0;
  let touchX=0.5,touchY=0.5,speedEnergy=0,rippleEnergy=0;

  function resize(){
    DPR=Math.min(2,window.devicePixelRatio||1);
    W=Math.floor(innerWidth*DPR); H=Math.floor(innerHeight*DPR);
    canvas.width=W; canvas.height=H;
  }
  addEventListener("resize",resize); resize();
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const firstTouch=()=>{const it=touches.values().next();return it.done?null:it.value};

  // ---------- 音：常時エンジン方式 ----------
  // ポイント：pointerdownで新しい「タップ音」を作らない。
  // 最初から同じ持続音エンジンを薄くフェードインするだけ。
  let ac=null, master=null, mainGain=null, osc1=null, osc2=null, osc3=null, lfo=null, lfoGain=null, filter=null;
  let delay=null, feedback=null, wetGain=null, noise=null, noiseFilter=null, noiseGain=null;
  let audioRunning=false;

  function initAudio(){
    if(ac) return;
    ac=new (window.AudioContext||window.webkitAudioContext)();

    master=ac.createGain(); master.gain.value=0.82;
    mainGain=ac.createGain(); mainGain.gain.value=0.0001;

    osc1=ac.createOscillator();
    osc2=ac.createOscillator();
    osc3=ac.createOscillator();
    lfo=ac.createOscillator();
    lfoGain=ac.createGain();
    filter=ac.createBiquadFilter();
    delay=ac.createDelay(1.2);
    feedback=ac.createGain();
    wetGain=ac.createGain();
    noise=ac.createBufferSource();
    noiseFilter=ac.createBiquadFilter();
    noiseGain=ac.createGain();

    osc1.type="sine";
    osc2.type="triangle";
    osc3.type="sine";
    lfo.type="sine";
    filter.type="bandpass";
    filter.frequency.value=900;
    filter.Q.value=9;

    const noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.22;
    noise.buffer=noiseBuf;
    noise.loop=true;
    noiseFilter.type="bandpass";
    noiseFilter.frequency.value=1500;
    noiseFilter.Q.value=2.5;
    noiseGain.gain.value=0.0;

    delay.delayTime.value=0.22;
    feedback.gain.value=0.22;
    wetGain.gain.value=0.32;
    lfo.frequency.value=3.0;
    lfoGain.gain.value=4.0;

    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);
    lfoGain.connect(osc2.frequency);
    lfoGain.connect(osc3.frequency);

    osc1.connect(mainGain);
    osc2.connect(mainGain);
    osc3.connect(mainGain);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(mainGain);

    mainGain.connect(filter);
    filter.connect(master);
    filter.connect(delay);
    delay.connect(feedback);
    feedback.connect(delay);
    delay.connect(wetGain);
    wetGain.connect(master);

    const comp=ac.createDynamicsCompressor();
    comp.threshold.value=-18; comp.knee.value=20; comp.ratio.value=5; comp.attack.value=0.008; comp.release.value=0.22;
    master.connect(comp);
    comp.connect(ac.destination);

    osc1.start();
    osc2.start();
    osc3.start();
    lfo.start();
    noise.start();

    soundBtn.classList.add("on");
    soundBtn.textContent="音 ON";
  }

  function setSoundOn(on){
    if(!ac) return;
    const now=ac.currentTime;
    mainGain.gain.cancelScheduledValues(now);

    if(on){
      // アタック音なし。持続音そのものをゆっくり出す。
      mainGain.gain.setTargetAtTime(0.15, now, 0.16);
      noiseGain.gain.setTargetAtTime(0.012, now, 0.22);
    }else{
      mainGain.gain.setTargetAtTime(0.0001, now, 0.13);
      noiseGain.gain.setTargetAtTime(0.0, now, 0.10);
    }
  }

  function updateSound(){
    if(!ac) return;

    const p=firstTouch();
    if(p){
      touchX += (p.x/innerWidth - touchX)*0.22;
      touchY += (p.y/innerHeight - touchY)*0.22;
    }

    const nx=clamp(touchX,0,1);
    const ny=clamp(touchY,0,1);
    const now=ac.currentTime;

    // 触ってる間だけ鳴る。何もしない時は薄く消える。
    const isTouching=!!p;
    const targetVolume=isTouching ? (0.12 + speedEnergy*0.05) : 0.0001;
    mainGain.gain.setTargetAtTime(targetVolume, now, isTouching ? 0.10 : 0.13);

    // 指位置と傾きで変化
    const base=70 + Math.pow(nx,1.35)*760;
    const waterBend=tiltX*45 - tiltY*35 + Math.sin(t*0.035)*7 + rippleEnergy*22;
    const f1=base + waterBend;
    const f2=base*(1.498 + ny*0.22) + waterBend*0.35 + speedEnergy*25;
    const f3=base*(2.01 + nx*0.15) - waterBend*0.18;

    osc1.frequency.setTargetAtTime(f1,now,0.04);
    osc2.frequency.setTargetAtTime(f2,now,0.04);
    osc3.frequency.setTargetAtTime(f3,now,0.04);

    const cutoff=320 + nx*1850 + (1-ny)*1350 + Math.abs(tiltX)*280 + Math.abs(tiltY)*280 + speedEnergy*600;
    filter.frequency.setTargetAtTime(cutoff,now,0.05);
    filter.Q.setTargetAtTime(6 + ny*17 + speedEnergy*5,now,0.05);

    lfo.frequency.setTargetAtTime(2.4 + Math.abs(tiltX)*3.2 + Math.abs(tiltY)*3.0 + ny*2.5,now,0.08);
    lfoGain.gain.setTargetAtTime(3 + ny*18 + rippleEnergy*12 + Math.abs(tiltX-tiltY)*8,now,0.08);

    noiseFilter.frequency.setTargetAtTime(800 + cutoff*0.55,now,0.08);
    noiseGain.gain.setTargetAtTime(isTouching ? (0.006 + speedEnergy*0.035) : 0.0,now,0.10);

    delay.delayTime.setTargetAtTime(0.12 + ny*0.20 + Math.abs(tiltY)*0.06,now,0.12);
    feedback.gain.setTargetAtTime(0.18 + nx*0.14 + rippleEnergy*0.06,now,0.12);
    wetGain.gain.setTargetAtTime(0.26 + Math.abs(tiltX)*0.09 + Math.abs(tiltY)*0.09,now,0.12);

    meter.style.width=isTouching ? Math.round((nx*0.55+(1-ny)*0.35+speedEnergy*0.10)*100)+"%" : "0%";
  }

  soundBtn.addEventListener("click",()=>{
    initAudio();
    ac.resume();
  });

  // ---------- 傾き ----------
  async function enableMotion(){
    try{
      if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
        const res=await DeviceOrientationEvent.requestPermission();
        if(res!=="granted") return;
      }
      motionBtn.classList.add("on");
      motionBtn.textContent="傾き ON";
      addEventListener("deviceorientation",e=>{
        targetTiltX=clamp((e.gamma||0)/35,-1,1);
        targetTiltY=clamp((e.beta||0)/45,-1,1);
      },true);
    }catch(e){ motionBtn.textContent="傾き不可"; }
  }
  motionBtn.addEventListener("click",enableMotion);

  // ---------- タッチ ----------
  function addRipple(x,y,power=1){
    ripples.push({x:x*DPR,y:y*DPR,r:2*DPR,age:0,life:95+Math.random()*30,power,h:x/innerWidth});
    rippleEnergy+=0.035*power;
  }

  canvas.addEventListener("pointerdown",e=>{
    canvas.setPointerCapture(e.pointerId);
    initAudio();
    ac.resume();
    const p={x:e.clientX,y:e.clientY,px:e.clientX,py:e.clientY};
    touches.set(e.pointerId,p);
    touchX=e.clientX/innerWidth; touchY=e.clientY/innerHeight;
    speedEnergy=0;
    addRipple(e.clientX,e.clientY,1.15);
    setSoundOn(true);
  });

  canvas.addEventListener("pointermove",e=>{
    const p=touches.get(e.pointerId); if(!p) return;
    const dx=e.clientX-p.x, dy=e.clientY-p.y;
    const sp=Math.sqrt(dx*dx+dy*dy);
    p.px=p.x; p.py=p.y; p.x=e.clientX; p.y=e.clientY;
    speedEnergy=speedEnergy*0.65 + clamp(sp/28,0,1)*0.35;
    if(sp>1.4) addRipple(e.clientX,e.clientY,Math.min(1.6,sp/15));
  });

  function endPointer(e){
    touches.delete(e.pointerId);
    const p=firstTouch();
    if(p){
      touchX=p.x/innerWidth; touchY=p.y/innerHeight;
      setSoundOn(true);
    }else{
      setSoundOn(false);
    }
  }
  canvas.addEventListener("pointerup",endPointer);
  canvas.addEventListener("pointercancel",endPointer);
  canvas.addEventListener("pointerleave",endPointer);

  // ---------- 描画 ----------
  function drawWater(){
    const phase=t*0.002;
    const g=ctx.createLinearGradient(W*(0.08+tiltX*.16),H*(0.02+tiltY*.12),W*(0.95-tiltX*.1),H*(1.05-tiltY*.10));
    g.addColorStop(0,`hsl(${215+Math.sin(phase)*35},85%,12%)`);
    g.addColorStop(.20,`hsl(${268+Math.sin(phase+1)*38},92%,32%)`);
    g.addColorStop(.42,`hsl(${184+Math.sin(phase+2)*45},95%,46%)`);
    g.addColorStop(.60,`hsl(${314+Math.sin(phase+3)*42},94%,59%)`);
    g.addColorStop(.78,`hsl(${53+Math.sin(phase+4)*35},96%,63%)`);
    g.addColorStop(1,`hsl(${220+Math.sin(phase+5)*38},86%,17%)`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    ctx.globalCompositeOperation="screen";
    for(let i=0;i<48;i++){
      const y=(H*(i/48)+Math.sin(t*.012+i)*25*DPR+tiltY*105*DPR)%H;
      const xoff=Math.sin(t*.006+i*1.7)*85*DPR+tiltX*165*DPR;
      ctx.beginPath();
      for(let x=-130*DPR;x<W+130*DPR;x+=22*DPR){
        const yy=y+Math.sin(x*.006+t*.018+i)*(9+(i%5)*2.5)*DPR;
        if(x<-120*DPR) ctx.moveTo(x+xoff,yy); else ctx.lineTo(x+xoff,yy);
      }
      ctx.strokeStyle=`hsla(${(i*15+t*.35)%360},100%,75%,${.045+(i%5)*.009})`;
      ctx.lineWidth=(.9+(i%3)*.55)*DPR; ctx.stroke();
    }

    const cx=W*(.5+tiltX*.14), cy=H*(.52+tiltY*.13);
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*.58);
    rg.addColorStop(0,"rgba(255,255,255,.20)");
    rg.addColorStop(.24,"rgba(255,160,240,.13)");
    rg.addColorStop(.56,"rgba(90,240,255,.085)");
    rg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation="source-over";
  }

  function drawRipples(){
    ctx.globalCompositeOperation="screen";
    for(let i=ripples.length-1;i>=0;i--){
      const p=ripples[i]; p.age++; p.r+=(2.3+p.power*2.6)*DPR;
      const a=Math.max(0,1-p.age/p.life);
      for(let k=0;k<4;k++){
        ctx.beginPath();
        ctx.arc(p.x+tiltX*12*DPR,p.y+tiltY*12*DPR,p.r+k*10*DPR,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${(p.h*360+k*55+t*.75)%360},100%,78%,${a*(.30-k*.052)})`;
        ctx.lineWidth=(1.45+k*.85)*DPR; ctx.stroke();
      }
      const glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*.7);
      glow.addColorStop(0,`hsla(${(p.h*360+t)%360},100%,80%,${a*.16})`);
      glow.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=glow; ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
      if(p.age>p.life) ripples.splice(i,1);
    }
    ctx.globalCompositeOperation="source-over";
  }

  function drawTouchGlow(){
    const p=firstTouch(); if(!p) return;
    ctx.globalCompositeOperation="screen";
    const x=p.x*DPR,y=p.y*DPR;
    const grd=ctx.createRadialGradient(x,y,0,x,y,175*DPR);
    grd.addColorStop(0,"rgba(255,255,255,.55)");
    grd.addColorStop(.22,"rgba(255,170,245,.28)");
    grd.addColorStop(.55,"rgba(90,220,255,.13)");
    grd.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=grd; ctx.fillRect(x-195*DPR,y-195*DPR,390*DPR,390*DPR);
    ctx.beginPath(); ctx.arc(x,y,10*DPR+Math.sin(t*.08)*2*DPR,0,Math.PI*2);
    ctx.strokeStyle="rgba(255,255,255,.72)"; ctx.lineWidth=1.4*DPR; ctx.stroke();
    ctx.globalCompositeOperation="source-over";
  }

  function animate(){
    t++;
    tiltX+=(targetTiltX-tiltX)*.055;
    tiltY+=(targetTiltY-tiltY)*.055;
    speedEnergy*=0.94;
    rippleEnergy*=0.986;

    const p=firstTouch();
    if(p && t%9===0) addRipple(p.x,p.y,0.34);

    updateSound();

    drawWater();
    drawRipples();
    drawTouchGlow();
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
